#cloud-config
# =============================================================================
# fio-runner.yaml — Cloud-init template for VM storage performance testing
# Variables replaced at runtime: __FIO_PROFILE__, __BLOCK_SIZE__, __TEST_DIR__,
#   __RUNTIME__, __RAMP_TIME__, __IODEPTH__, __NUMJOBS__, __FILE_SIZE__,
#   __VM_NAME__, __SSH_PUB_KEY__, __FIO_TIMEOUT__
# =============================================================================

hostname: __VM_NAME__

users:
  - name: __SSH_USER__
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - __SSH_PUB_KEY__

ssh_pwauth: false

bootcmd:
  # Stop firewalld AND flush all nftables/iptables rules to immediately open all ports
  - [ "systemctl", "stop", "firewalld" ]
  - [ "systemctl", "disable", "firewalld" ]
  - [ "nft", "flush", "ruleset" ]
  - [ "iptables", "-F" ]
  - [ "iptables", "-P", "INPUT", "ACCEPT" ]

package_update: true
packages:
  - openssh-server
  - openssh-clients
  - fio
  - jq
  - sysstat
  - nvme-cli
  - util-linux

# Format the data disk (vdb = second virtio disk, after rootdisk on vda)
fs_setup:
  - label: perfdata
    filesystem: xfs
    device: /dev/vdb
    overwrite: false

# Mount the data disk at the test directory
mounts:
  - [/dev/vdb, __TEST_DIR__, xfs, "defaults,noatime", "0", "0"]

write_files:
  # Ensure sshd does not hang on reverse DNS lookups
  - path: /etc/ssh/sshd_config.d/99-perf-test.conf
    permissions: '0644'
    content: |
      UseDNS no
      GSSAPIAuthentication no

  # Main fio job file (injected at runtime)
  - path: /opt/perf-test/fio-job.fio
    permissions: '0644'
    content: |
      __FIO_JOB_CONTENT__

  # Runner script that executes fio and writes structured output
  - path: /opt/perf-test/run-benchmark.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      VM_NAME="__VM_NAME__"
      TEST_DIR="__TEST_DIR__"
      RESULTS_DIR="/opt/perf-test/results"
      RESULTS_FILE="${RESULTS_DIR}/${VM_NAME}-results.json"

      mkdir -p "${TEST_DIR}" "${RESULTS_DIR}"

      # Verify data disk is mounted (not just a directory on the root disk)
      if ! mountpoint -q "${TEST_DIR}"; then
        echo "ERROR: ${TEST_DIR} is not a mount point — data disk may not be formatted/mounted"
        echo "Block devices:"
        lsblk
        echo "Mounts:"
        mount | grep -E '(vd[a-z]|data)' || true
        exit 1
      fi

      echo "=== VM Storage Performance Test ==="
      echo "VM: ${VM_NAME}"
      echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      echo "Kernel: $(uname -r)"
      echo ""

      # Collect system info
      echo '--- System Info ---'
      lscpu | grep -E "^(Architecture|CPU\(s\)|Model name|Thread)" || true
      free -h
      echo ""

      # Collect storage info
      echo '--- Storage Info ---'
      lsblk -d -o NAME,SIZE,ROTA,TRAN,MODEL 2>/dev/null || true
      df -h "${TEST_DIR}" 2>/dev/null || true
      echo ""

      # Prefill the test file when the job declares filename=fio-testfile.
      # Sequential 4M writes allocate every Ceph object up-front so the
      # measurement window doesn't conflate sparse-RBD first-write allocation
      # cost with steady-state latency. Skipped when the profile doesn't opt in
      # via filename=fio-testfile.
      if grep -q '^filename=fio-testfile' /opt/perf-test/fio-job.fio; then
        echo '--- Pre-filling fio-testfile (allocate Ceph objects) ---'
        prefill_start=$(date +%s)
        fio --name=prefill --filename="${TEST_DIR}/fio-testfile" \
          --rw=write --bs=4M --size=__FILE_SIZE__ --direct=1 \
          --ioengine=libaio --iodepth=8 --numjobs=1 \
          --output=/dev/null 2>&1 || echo "WARN: prefill failed, continuing"
        echo "Prefill complete in $(( $(date +%s) - prefill_start ))s"
        echo ""
      fi

      # Synchronized fio measurement start. When __FIO_START_EPOCH__ > 0, sleep
      # until that wall-clock epoch before launching fio. Eliminates first-mover
      # penalty in concurrent runs: all VMs start measurement at the same instant
      # regardless of boot/prefill variance. Set to 0 for single-VM tests.
      FIO_START_EPOCH=__FIO_START_EPOCH__
      if [[ "${FIO_START_EPOCH}" -gt 0 ]]; then
        now=$(date +%s)
        if [[ "${now}" -lt "${FIO_START_EPOCH}" ]]; then
          wait_secs=$(( FIO_START_EPOCH - now ))
          echo "--- Sync barrier: sleeping ${wait_secs}s until fio start epoch ${FIO_START_EPOCH} ---"
          sleep "${wait_secs}"
        else
          echo "--- WARN: missed fio start epoch by $(( now - FIO_START_EPOCH ))s (still launching) ---"
        fi
      fi

      # Run fio
      echo '--- Running fio ---'
      fio /opt/perf-test/fio-job.fio \
        --directory="${TEST_DIR}" \
        --output-format=json+ \
        --output="${RESULTS_FILE}" \
        2>&1

      echo ""
      echo '--- fio Results Summary ---'
      if [[ -f "${RESULTS_FILE}" ]]; then
        jq -r '
          .jobs[] |
          "Job: \(.jobname)",
          "  Read:  IOPS=\(.read.iops // 0 | floor) BW=\(.read.bw // 0)KiB/s lat_avg=\(.read.lat_ns.mean // 0 | . / 1000000 | . * 100 | floor | . / 100)ms",
          "  Write: IOPS=\(.write.iops // 0 | floor) BW=\(.write.bw // 0)KiB/s lat_avg=\(.write.lat_ns.mean // 0 | . / 1000000 | . * 100 | floor | . / 100)ms",
          ""
        ' "${RESULTS_FILE}" 2>/dev/null || echo "Could not parse JSON results"
      fi

  # Systemd service to auto-run benchmark on boot
  - path: /etc/systemd/system/perf-test.service
    permissions: '0644'
    content: |
      [Unit]
      Description=VM Storage Performance Test
      After=multi-user.target

      [Service]
      Type=oneshot
      ExecStart=/opt/perf-test/run-benchmark.sh
      StandardOutput=journal+console
      StandardError=journal+console
      RemainAfterExit=yes
      TimeoutStartSec=__FIO_TIMEOUT__

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Disable firewall (CentOS/RHEL enable firewalld by default, blocking SSH)
  - systemctl disable --now firewalld || true
  # Ensure SSH is running (Fedora 43+ may not enable sshd by default)
  - systemctl enable --now sshd
  # Enable and start the benchmark service
  - systemctl daemon-reload
  - systemctl enable perf-test.service
  - systemctl start perf-test.service
